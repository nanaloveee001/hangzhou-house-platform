name: 杭州房价数据定时抓取

on:
  schedule:
    # 每天北京时间 00:00 运行（GitHub Actions 使用 UTC，北京=UTC+8）
    - cron: '0 16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r crawler/requirements.txt

      - name: 运行爬虫（Key 来自 Secrets，不暴露前端）
        env:
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
        run: python crawler/crawler.py

      - name: 提交更新后的数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "无数据变化，跳过提交"
          else
            git commit -m "chore: 每日数据更新 $(date +'%Y-%m-%d')"
            git push
          fi
